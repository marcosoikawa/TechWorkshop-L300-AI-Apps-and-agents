# Builds the Docker image from src/, pushes it to Azure Container Registry,
# and updates the Azure Container App to use the newly pushed image.
#
# Required GitHub Secrets:
#   AZURE_CREDENTIALS        - Azure service principal JSON (az ad sp create-for-rbac output)
#   ACR_LOGIN_SERVER         - ACR login server, e.g. myregistry.azurecr.io
#   ACR_NAME                 - ACR resource name, e.g. myregistry
#   AZURE_RESOURCE_GROUP     - Resource group that contains the Container App
#   AZURE_CONTAINERAPP_NAME  - Name of the Azure Container App to update
#   FOUNDRY_ENDPOINT         - Value for the FOUNDRY_ENDPOINT env var on the Container App
#   gpt_endpoint             - Value for the gpt_endpoint env var on the Container App
#   embedding_endpoint       - Value for the embedding_endpoint env var on the Container App
#   phi_4_endpoint           - Value for the phi_4_endpoint env var on the Container App

name: Build and Deploy to Azure Container App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # -----------------------------------------------------------------------
      # 1. Check out the repository so we can access the src/ directory.
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Log in to Azure using a service principal stored in AZURE_CREDENTIALS.
      #    The secret value must be the JSON output of:
      #      az ad sp create-for-rbac --sdk-auth
      # -----------------------------------------------------------------------
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # -----------------------------------------------------------------------
      # 3. Log in to Azure Container Registry so Docker can push the image.
      # -----------------------------------------------------------------------
      - name: Log in to Azure Container Registry
        run: |
          az acr login --name "${{ secrets.ACR_NAME }}"

      # -----------------------------------------------------------------------
      # 4. Build the Docker image.
      #    - Build context: src/   (only files inside src/ are sent to Docker)
      #    - Dockerfile:    src/Dockerfile
      #    - Tag:           <acr-login-server>/<repo>:<commit-sha>
      # -----------------------------------------------------------------------
      - name: Build Docker image
        run: |
          IMAGE_TAG="${{ secrets.ACR_LOGIN_SERVER }}/${{ github.repository }}:${{ github.sha }}"
          # Normalize to lower-case; ACR requires lower-case repository names
          IMAGE_TAG=$(echo "$IMAGE_TAG" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

          docker build \
            --file src/Dockerfile \
            --tag "$IMAGE_TAG" \
            src/

      # -----------------------------------------------------------------------
      # 5. Push the image to ACR.
      # -----------------------------------------------------------------------
      - name: Push Docker image to ACR
        run: |
          docker push "$IMAGE_TAG"

      # -----------------------------------------------------------------------
      # 6. Ensure the four secrets exist on the Container App (creates or
      #    updates them).  Done before the update step so the secretref
      #    references in step 7 resolve correctly.
      #    Values are passed via environment variables so they are never
      #    echoed as plain-text CLI arguments.
      # -----------------------------------------------------------------------
      - name: Upsert Container App secrets
        env:
          FOUNDRY_ENDPOINT_VAL: ${{ secrets.FOUNDRY_ENDPOINT }}
          GPT_ENDPOINT_VAL: ${{ secrets.gpt_endpoint }}
          EMBEDDING_ENDPOINT_VAL: ${{ secrets.embedding_endpoint }}
          PHI_4_ENDPOINT_VAL: ${{ secrets.phi_4_endpoint }}
        run: |
          az containerapp secret set \
            --name "${{ secrets.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --secrets \
              "foundry-endpoint=$FOUNDRY_ENDPOINT_VAL" \
              "gpt-endpoint=$GPT_ENDPOINT_VAL" \
              "embedding-endpoint=$EMBEDDING_ENDPOINT_VAL" \
              "phi-4-endpoint=$PHI_4_ENDPOINT_VAL"

      # -----------------------------------------------------------------------
      # 7. Update the Azure Container App to use the new image and wire the
      #    four environment variables to the secrets created above.
      #    Existing environment variables already configured in Azure are
      #    preserved; only these four are explicitly (re-)set on every deploy.
      # -----------------------------------------------------------------------
      - name: Update Azure Container App
        run: |
          az containerapp update \
            --name "${{ secrets.AZURE_CONTAINERAPP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "$IMAGE_TAG" \
            --set-env-vars \
              "FOUNDRY_ENDPOINT=secretref:foundry-endpoint" \
              "gpt_endpoint=secretref:gpt-endpoint" \
              "embedding_endpoint=secretref:embedding-endpoint" \
              "phi_4_endpoint=secretref:phi-4-endpoint"
